name: orbit
options:
  bundleIdPrefix: com.orbit
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.5.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    from: 0.9.0

configFiles:
  Debug: Config/Project.xcconfig
  Release: Config/Project.xcconfig

settings:
  base:
    MARKETING_VERSION: "0.5.17"
    CURRENT_PROJECT_VERSION: "22"
    CODE_SIGN_STYLE: Manual
    SWIFT_VERSION: "5.9"
    ARCHS: "arm64 x86_64"
  configs:
    Debug:
      # Debug: build only active arch for faster dev builds.
      # DEVELOPMENT_TEAM and CODE_SIGN_IDENTITY live in Config/Project.xcconfig
      # so contributors can override them without editing project.yml.
      ONLY_ACTIVE_ARCH: YES
    Release:
      # Release: universal binary, --timestamp for notarization.
      OTHER_CODE_SIGN_FLAGS: "--timestamp"
      ONLY_ACTIVE_ARCH: NO

targets:
  orbit:
    type: application
    platform: macOS
    sources:
      - path: orbit
        excludes:
          - "**/.DS_Store"
          - "**/LaunchDaemons/**"
    postBuildScripts:
      - name: Copy LaunchDaemons
        script: |
          mkdir -p "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchDaemons"
          cp "${SRCROOT}/orbit/Resources/LaunchDaemons/com.orbit.helper.plist" "${TARGET_BUILD_DIR}/${CONTENTS_FOLDER_PATH}/Library/LaunchDaemons/"
        basedOnDependencyAnalysis: false
    dependencies:
      - target: com.orbit.helper
        embed: true
        codeSign: true
        copy:
          destination: wrapper
          subpath: "Contents/Library/LaunchServices"
      - package: Sparkle
        product: Sparkle
      - package: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orbit.app
        PRODUCT_NAME: Orbit
        INFOPLIST_FILE: orbit/Resources/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          # Debug: Allow debugger attachment (injects com.apple.security.get-task-allow)
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: YES
        Release:
          # Release: No debug entitlements for notarization
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    entitlements:
      path: orbit/Resources/orbit.entitlements
      properties:
        com.apple.security.app-sandbox: false

  com.orbit.helper:
    type: tool
    platform: macOS
    sources:
      - path: orbitHelper
        excludes:
          - "**/.DS_Store"
          - "launchd.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orbit.helper
        PRODUCT_NAME: com.orbit.helper
        SKIP_INSTALL: YES
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
        INFOPLIST_FILE: orbitHelper/Info.plist
        CREATE_INFOPLIST_SECTION_IN_BINARY: YES
        OTHER_LDFLAGS: "-sectcreate __TEXT __launchd_plist $(SRCROOT)/orbitHelper/launchd.plist"
      configs:
        Release:
          OTHER_CODE_SIGN_FLAGS: "--timestamp"

  orbitTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: orbitTests
    dependencies:
      - target: orbit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.orbit.app.tests
        GENERATE_INFOPLIST_FILE: YES
        # Inherits DEVELOPMENT_TEAM and CODE_SIGN_IDENTITY from project-level
        # Config/Project.xcconfig (overridable via Config/Project.local.xcconfig).
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Orbit.app/Contents/MacOS/Orbit"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  orbit:
    build:
      targets:
        orbit: all
        com.orbit.helper: all
        orbitTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - orbitTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
